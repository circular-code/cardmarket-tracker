name: Daily Cardmarket Snapshot

on:
  schedule:
    # UTC. 04:37 UTC is 06:37 in Germany during CEST and 05:37 during CET.
    # Avoid :00 because scheduled workflow load is often higher at the top of the hour.
    - cron: "37 4 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Collect Cardmarket snapshot
        run: python scripts/collect_snapshot.py

      - name: Commit data changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if [[ -n "$(git status --porcelain data/)" ]]; then
            git add data/
            git commit -m "Add Cardmarket snapshot $(date -u +'%Y-%m-%d')"
            git push
          else
            echo "No data changes to commit."
          fi
